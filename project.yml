name: Loka
options:
  bundleIdPrefix: com.loka
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    # Manual signing against the com.rbchronicles* wildcard profile (team YZFSC6CZ7H).
    DEVELOPMENT_TEAM: YZFSC6CZ7H
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Loka:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Loka
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Loka/Resources/Assets.xcassets
      - path: Loka/Resources/Preview Content
    info:
      path: Loka/App/Info.plist
      properties:
        CFBundleDisplayName: Loka
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        # Dev/staging backend is served over plain HTTP (16.112.4.127:8000).
        # TODO: remove once the backend is behind HTTPS.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rbchronicles.loka.app
        PROVISIONING_PROFILE_SPECIFIER: Wildcard_ios
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Loka/Resources/Preview Content\""
        TARGETED_DEVICE_FAMILY: "1,2"
